  // ==================== 存储键 ====================
  const STORAGE_KEYS = {
    WRONG_BANK: 'zian_wrong_bank',
    MARKED_BANK: 'zian_marked_bank',
    DONE_QUESTIONS: 'zian_done_questions',
  };

  // ==================== 全局状态 ====================
  let currentQuestions = [];
  let currentIndex = 0;
  let correctCount = 0;
  let wrongCount = 0;
  let selectedOptions = [];
  let answered = false;
  let quizMode = 'random';
  let userAnswers = [];
  let browseList = [];
  let browseIndex = 0;

  // ==================== 工具函数 ====================
  function shuffle(array) {
    const arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function getStorage(key) {
    try {
      return JSON.parse(localStorage.getItem(key)) || [];
    } catch(e) {
      return [];
    }
  }

  function setStorage(key, value) {
    localStorage.setItem(key, JSON.stringify(value));
  }

  function getChapterName(chapterId) {
    const ch = CHAPTERS.find(c => c.id === chapterId);
    return ch ? ch.name : '未知章节';
  }

  function getCorrectOptions(question) {
    const ans = question.answer;
    if (Array.isArray(ans)) return ans;
    return ans.split('');
  }

  function isAnswerCorrect(question, selected) {
    const correct = getCorrectOptions(question);
    if (selected.length !== correct.length) return false;
    return selected.every(s => correct.includes(s)) && correct.every(c => selected.includes(c));
  }

  function showPanel(panelId) {
    document.querySelectorAll('.controls-section').forEach(p => p.classList.remove('active'));
    document.getElementById(panelId).classList.add('active');
    window.scrollTo(0, 0);
  }

  // ==================== 主页 ====================
  function updateHomeStats() {
    document.getElementById('totalQCount').textContent = QUESTIONS.length;
    document.getElementById('homeWrongCount').textContent = getStorage(STORAGE_KEYS.WRONG_BANK).length;
    document.getElementById('homeMarkedCount').textContent = getStorage(STORAGE_KEYS.MARKED_BANK).length;
  }

  // ==================== 设置 ====================
  function initChapterList() {
    const container = document.getElementById('chapterList');
    container.innerHTML = '';
    CHAPTERS.forEach(ch => {
      const btn = document.createElement('div');
      btn.className = 'chapter-btn selected';
      btn.dataset.chapterId = ch.id;
      btn.textContent = ch.name + ' (' + ch.count + '题)';
      btn.onclick = function() {
        this.classList.toggle('selected');
      };
      container.appendChild(btn);
    });
  }

  function selectAllChapters(select) {
    document.querySelectorAll('#chapterList .chapter-btn').forEach(btn => {
      if (select) btn.classList.add('selected');
      else btn.classList.remove('selected');
    });
  }

  function selectMode(el) {
    document.querySelectorAll('.mode-item').forEach(m => m.classList.remove('selected'));
    el.classList.add('selected');
    quizMode = el.dataset.mode;
  }

  function getSelectedChapters() {
    const selected = [];
    document.querySelectorAll('#chapterList .chapter-btn.selected').forEach(btn => {
      selected.push(parseInt(btn.dataset.chapterId));
    });
    return selected;
  }

  function getSelectedTypes() {
    const types = [];
    if (document.getElementById('typeSingle').checked) types.push('single');
    if (document.getElementById('typeMulti').checked) types.push('multi');
    return types;
  }

  // ==================== 答题 ====================
  function startQuiz() {
    const chapters = getSelectedChapters();
    const types = getSelectedTypes();
    
    if (chapters.length === 0) {
      alert('请至少选择一个章节');
      return;
    }
    if (types.length === 0) {
      alert('请至少选择一种题型');
      return;
    }

    let pool = QUESTIONS.filter(q => 
      chapters.includes(q.chapter) && types.includes(q.type)
    );

    if (pool.length === 0) {
      alert('没有符合条件的题目');
      return;
    }

    if (quizMode === 'random') {
      const count = parseInt(document.getElementById('questionCount').value) || 20;
      currentQuestions = shuffle(pool).slice(0, Math.min(count, pool.length));
    } else {
      currentQuestions = pool;
    }

    currentIndex = 0;
    correctCount = 0;
    wrongCount = 0;
    userAnswers = [];

    document.getElementById('totalCount').textContent = currentQuestions.length;

    const progressWrap = document.getElementById('progressWrap');
    if (document.getElementById('showProgress').checked) {
      progressWrap.style.display = 'block';
    } else {
      progressWrap.style.display = 'none';
    }

    showPanel('testPanel');
    showQuestion();
  }

  function showQuestion() {
    const q = currentQuestions[currentIndex];
    selectedOptions = [];
    answered = false;

    const typeBadge = q.type === 'single' 
      ? '<span class="type-badge type-single">单选题</span>'
      : '<span class="type-badge type-multi">多选题</span>';
    
    document.getElementById('questionMeta').innerHTML = 
      typeBadge + '<span class="chapter-badge">' + getChapterName(q.chapter) + '</span>';
    document.getElementById('questionText').textContent = '【' + (currentIndex + 1) + '】' + q.text;

    const grid = document.getElementById('optionsGrid');
    grid.innerHTML = '';
    q.options.forEach((opt, idx) => {
      const label = document.createElement('label');
      label.className = 'option-item';
      const inputType = q.type === 'single' ? 'radio' : 'checkbox';
      label.innerHTML = '<input type="' + inputType + '" name="qopt" data-idx="' + idx + '"><span class="opt-label">' + opt + '</span>';
      label.onclick = function(e) {
        if (answered) { e.preventDefault(); return; }
        const input = this.querySelector('input');
        setTimeout(() => {
          if (q.type === 'single') {
            selectedOptions = [idx];
          } else {
            if (selectedOptions.includes(idx)) {
              selectedOptions = selectedOptions.filter(i => i !== idx);
            } else {
              selectedOptions.push(idx);
            }
            selectedOptions.sort((a,b) => a-b);
          }
        }, 0);
      };
      grid.appendChild(label);
    });

    document.getElementById('feedbackContainer').innerHTML = '';
    document.getElementById('submitBtn').style.display = 'inline-block';
    document.getElementById('nextBtn').style.display = 'none';

    updateMarkBtn();
    updateProgress();
  }

  function updateProgress() {
    const percent = (currentIndex / currentQuestions.length) * 100;
    document.getElementById('progressBar').style.width = percent + '%';
  }

  function updateMarkBtn() {
    const q = currentQuestions[currentIndex];
    const marked = getStorage(STORAGE_KEYS.MARKED_BANK).includes(q.id);
    const btn = document.getElementById('markBtn');
    if (marked) {
      btn.classList.add('marked');
      btn.textContent = '⭐ 已标记';
    } else {
      btn.classList.remove('marked');
      btn.textContent = '⭐ 标记';
    }
  }

  function toggleMark() {
    const q = currentQuestions[currentIndex];
    let marked = getStorage(STORAGE_KEYS.MARKED_BANK);
    const idx = marked.indexOf(q.id);
    if (idx >= 0) {
      marked.splice(idx, 1);
    } else {
      marked.push(q.id);
    }
    setStorage(STORAGE_KEYS.MARKED_BANK, marked);
    updateMarkBtn();
  }

  function submitAnswer() {
    if (selectedOptions.length === 0) {
      alert('请选择答案');
      return;
    }

    answered = true;
    const q = currentQuestions[currentIndex];
    const correct = isAnswerCorrect(q, selectedOptions.map(i => String.fromCharCode(65 + i)));

    userAnswers[currentIndex] = {
      selected: selectedOptions,
      correct: correct
    };

    if (correct) {
      correctCount++;
    } else {
      wrongCount++;
      if (document.getElementById('autoWrongBank').checked) {
        addToWrongBank(q.id);
      }
    }

    document.getElementById('doneCount').textContent = currentIndex + 1;
    document.getElementById('correctCount').textContent = correctCount;
    document.getElementById('wrongCount').textContent = wrongCount;
    const acc = currentIndex + 1 > 0 ? Math.round((correctCount / (currentIndex + 1)) * 100) : 0;
    document.getElementById('accuracy').textContent = acc;

    if (document.getElementById('instantFeedback').checked) {
      showFeedback(q, correct);
    }

    document.getElementById('submitBtn').style.display = 'none';
    document.getElementById('nextBtn').style.display = 'inline-block';
  }

  function showFeedback(q, correct) {
    const correctIndices = getCorrectOptions(q).map(a => a.charCodeAt(0) - 65);
    const options = document.querySelectorAll('#optionsGrid .option-item');
    
    options.forEach((opt, i) => {
      const input = opt.querySelector('input');
      opt.style.pointerEvents = 'none';
      
      if (correctIndices.includes(i)) {
        opt.classList.add('show-correct');
      }
      if (selectedOptions.includes(i) && !correctIndices.includes(i)) {
        opt.classList.add('show-wrong');
      }
    });

    const correctText = correctIndices.map(i => q.options[i]).join('、');
    const feedback = document.createElement('div');
    feedback.className = 'feedback-inline ' + (correct ? 'feedback-correct' : 'feedback-wrong');
    feedback.innerHTML = (correct ? '✅ 回答正确！' : '❌ 回答错误！') +
      '<br><strong>正确答案：</strong>' + q.answer + '. ' + correctText;
    document.getElementById('feedbackContainer').appendChild(feedback);
  }

  function nextQuestion() {
    if (currentIndex < currentQuestions.length - 1) {
      currentIndex++;
      showQuestion();
    } else {
      showResult();
    }
  }

  function prevQuestion() {
    if (currentIndex > 0) {
      currentIndex--;
      showQuestion();
      const prevAns = userAnswers[currentIndex];
      if (prevAns) {
        selectedOptions = prevAns.selected;
        answered = true;
        const q = currentQuestions[currentIndex];
        document.getElementById('submitBtn').style.display = 'none';
        document.getElementById('nextBtn').style.display = 'inline-block';
        
        const options = document.querySelectorAll('#optionsGrid .option-item');
        selectedOptions.forEach(idx => {
          options[idx].querySelector('input').checked = true;
        });
        
        showFeedback(q, prevAns.correct);
      }
    }
  }

  function exitQuiz() {
    if (confirm('确定要退出答题吗？当前进度将会丢失。')) {
      showPanel('homePanel');
      updateHomeStats();
    }
  }

  // ==================== 结果 ====================
  function showResult() {
    const total = currentQuestions.length;
    document.getElementById('resTotal').textContent = total;
    document.getElementById('resCorrect').textContent = correctCount;
    document.getElementById('resWrong').textContent = wrongCount;
    const acc = total > 0 ? Math.round((correctCount / total) * 100) : 0;
    document.getElementById('resAccuracy').textContent = acc + '%';
    document.getElementById('reviewPanel').style.display = 'none';
    showPanel('resultPanel');
  }

  function showWrongPanel() {
    const panel = document.getElementById('reviewPanel');
    panel.style.display = 'block';
    panel.innerHTML = '';
    
    let wrongItems = [];
    currentQuestions.forEach((q, i) => {
      const ua = userAnswers[i];
      if (ua && !ua.correct) {
        wrongItems.push({q, ua});
      }
    });

    if (wrongItems.length === 0) {
      panel.innerHTML = '<div class="empty-tip">🎉 恭喜！没有错题！</div>';
      return;
    }

    wrongItems.forEach((item, idx) => {
      const {q, ua} = item;
      const correctText = getCorrectOptions(q).map(a => q.options[a.charCodeAt(0) - 65]).join('、');
      const userText = ua.selected.map(i => q.options[i]).join('、');
      
      const div = document.createElement('div');
      div.className = 'wrong-answer-item';
      div.innerHTML = '<div style="font-weight:bold;margin-bottom:5px">' + (idx + 1) + '. ' + q.text + '</div>' +
        '<div style="font-size:0.85rem;color:#666;line-height:1.6">' +
        '<div class="stat-correct" style="font-weight:bold">✅ 正确答案：' + q.answer + '. ' + correctText + '</div>' +
        '<div class="stat-wrong" style="font-weight:bold">❌ 你的答案：' + userText + '</div>' +
        '</div>';
      panel.appendChild(div);
    });
  }

  function showAllReview() {
    const panel = document.getElementById('reviewPanel');
    panel.style.display = 'block';
    panel.innerHTML = '';

    currentQuestions.forEach((q, i) => {
      const ua = userAnswers[i] || {selected: [], correct: false};
      const correctText = getCorrectOptions(q).map(a => q.options[a.charCodeAt(0) - 65]).join('、');
      const userText = ua.selected.length > 0 ? ua.selected.map(i => q.options[i]).join('、') : '未作答';
      
      const div = document.createElement('div');
      div.className = 'wrong-answer-item';
      div.style.borderLeftColor = ua.correct ? '#34a853' : '#ea4335';
      div.innerHTML = '<div style="font-weight:bold;margin-bottom:5px">' + (i + 1) + '. ' + q.text + '</div>' +
        '<div style="font-size:0.85rem;color:#666;line-height:1.6">' +
        '<div class="stat-correct">✅ 正确答案：' + q.answer + '. ' + correctText + '</div>' +
        '<div class="' + (ua.correct ? 'stat-correct' : 'stat-wrong') + '">' + 
        (ua.correct ? '✅ 你答对了' : '❌ 你的答案：' + userText) + '</div>' +
        '</div>';
      panel.appendChild(div);
    });
  }

  // ==================== 错题本 ====================
  function addToWrongBank(qid) {
    let wrongs = getStorage(STORAGE_KEYS.WRONG_BANK);
    if (!wrongs.includes(qid)) {
      wrongs.push(qid);
      setStorage(STORAGE_KEYS.WRONG_BANK, wrongs);
    }
  }

  function showWrongBank() {
    const wrongs = getStorage(STORAGE_KEYS.WRONG_BANK);
    document.getElementById('wrongBankCount').textContent = wrongs.length;
    
    const list = document.getElementById('wrongBankList');
    list.innerHTML = '';
    
    if (wrongs.length === 0) {
      list.innerHTML = '<div class="empty-tip">错题本为空，继续加油！</div>';
    } else {
      wrongs.forEach(qid => {
        const q = QUESTIONS.find(q => q.id === qid);
        if (q) {
          const div = document.createElement('div');
          div.className = 'bank-list-item';
          div.innerHTML = '<div class="bank-q">' + 
            (q.type === 'single' ? '<span class="type-badge type-single">单</span>' : '<span class="type-badge type-multi">多</span>') +
            q.text + '</div>' +
            '<div class="bank-meta">' + getChapterName(q.chapter) + ' · 正确答案: ' + q.answer + '</div>';
          div.onclick = function() {
            browseSpecific(qid);
          };
          list.appendChild(div);
        }
      });
    }
    
    showPanel('wrongBankPanel');
  }

  function practiceWrong() {
    const wrongs = getStorage(STORAGE_KEYS.WRONG_BANK);
    if (wrongs.length === 0) {
      alert('错题本为空');
      return;
    }
    
    currentQuestions = shuffle(QUESTIONS.filter(q => wrongs.includes(q.id)));
    currentIndex = 0;
    correctCount = 0;
    wrongCount = 0;
    userAnswers = [];
    
    document.getElementById('totalCount').textContent = currentQuestions.length;
    document.getElementById('progressWrap').style.display = 'block';
    document.getElementById('testTitle').textContent = '错题专项练习';
    
    showPanel('testPanel');
    showQuestion();
  }

  function clearWrongBank() {
    if (confirm('确定要清空错题本吗？')) {
      setStorage(STORAGE_KEYS.WRONG_BANK, []);
      showWrongBank();
    }
  }

  function exportWrongTxt() {
    const wrongs = getStorage(STORAGE_KEYS.WRONG_BANK);
    if (wrongs.length === 0) {
      alert('错题本为空');
      return;
    }
    
    let content = '========================================\n';
    content += '         错题本导出\n';
    content += ' 导出时间: ' + new Date().toLocaleString() + '\n';
    content += ' 共 ' + wrongs.length + ' 题\n';
    content += '========================================\n\n';
    
    let qidx = 1;
    wrongs.forEach(qid => {
      const q = QUESTIONS.find(q => q.id === qid);
      if (q) {
        content += qidx + '. [' + (q.type === 'single' ? '单选题' : '多选题') + '] ' + q.text + '\n';
        q.options.forEach(opt => {
          content += '   ' + opt + '\n';
        });
        content += '   【正确答案】' + q.answer + '\n';
        content += '   【章节】' + getChapterName(q.chapter) + '\n\n';
        qidx++;
      }
    });
    
    downloadFile(content, '错题本_' + new Date().toISOString().slice(0,10) + '.txt');
  }

  // ==================== 标记题目 ====================
  function showMarkedBank() {
    const marked = getStorage(STORAGE_KEYS.MARKED_BANK);
    document.getElementById('markedBankCount').textContent = marked.length;
    
    const list = document.getElementById('markedBankList');
    list.innerHTML = '';
    
    if (marked.length === 0) {
      list.innerHTML = '<div class="empty-tip">暂无标记题目</div>';
    } else {
      marked.forEach(qid => {
        const q = QUESTIONS.find(q => q.id === qid);
        if (q) {
          const div = document.createElement('div');
          div.className = 'bank-list-item';
          div.innerHTML = '<div class="bank-q">' + 
            (q.type === 'single' ? '<span class="type-badge type-single">单</span>' : '<span class="type-badge type-multi">多</span>') +
            q.text + '</div>' +
            '<div class="bank-meta">' + getChapterName(q.chapter) + ' · 正确答案: ' + q.answer + 
            ' <span style="color:#ea4335;cursor:pointer;margin-left:10px" onclick="event.stopPropagation();removeMarked(' + qid + ')">[取消标记]</span></div>';
          div.onclick = function() {
            browseSpecific(qid);
          };
          list.appendChild(div);
        }
      });
    }
    
    showPanel('markedBankPanel');
  }

  function removeMarked(qid) {
    let marked = getStorage(STORAGE_KEYS.MARKED_BANK);
    marked = marked.filter(id => id !== qid);
    setStorage(STORAGE_KEYS.MARKED_BANK, marked);
    showMarkedBank();
  }

  function practiceMarked() {
    const marked = getStorage(STORAGE_KEYS.MARKED_BANK);
    if (marked.length === 0) {
      alert('没有标记的题目');
      return;
    }
    
    currentQuestions = shuffle(QUESTIONS.filter(q => marked.includes(q.id)));
    currentIndex = 0;
    correctCount = 0;
    wrongCount = 0;
    userAnswers = [];
    
    document.getElementById('totalCount').textContent = currentQuestions.length;
    document.getElementById('progressWrap').style.display = 'block';
    document.getElementById('testTitle').textContent = '标记题专项练习';
    
    showPanel('testPanel');
    showQuestion();
  }

  function clearMarkedBank() {
    if (confirm('确定要清空所有标记吗？')) {
      setStorage(STORAGE_KEYS.MARKED_BANK, []);
      showMarkedBank();
    }
  }

  function exportMarkedTxt() {
    const marked = getStorage(STORAGE_KEYS.MARKED_BANK);
    if (marked.length === 0) {
      alert('没有标记的题目');
      return;
    }
    
    let content = '========================================\n';
    content += '         标记题目导出\n';
    content += ' 导出时间: ' + new Date().toLocaleString() + '\n';
    content += ' 共 ' + marked.length + ' 题\n';
    content += '========================================\n\n';
    
    let qidx = 1;
    marked.forEach(qid => {
      const q = QUESTIONS.find(q => q.id === qid);
      if (q) {
        content += qidx + '. [' + (q.type === 'single' ? '单选题' : '多选题') + '] ' + q.text + '\n';
        q.options.forEach(opt => {
          content += '   ' + opt + '\n';
        });
        content += '   【正确答案】' + q.answer + '\n';
        content += '   【章节】' + getChapterName(q.chapter) + '\n\n';
        qidx++;
      }
    });
    
    downloadFile(content, '标记题目_' + new Date().toISOString().slice(0,10) + '.txt');
  }

  // ==================== 题库浏览 ====================
  function initBrowse() {
    const chId = parseInt(document.getElementById('browseChapter').value);
    const type = document.getElementById('browseType').value;
    
    browseList = QUESTIONS.filter(q => {
      if (chId > 0 && q.chapter !== chId) return false;
      if (type !== 'all' && q.type !== type) return false;
      return true;
    });
    
    document.getElementById('browseTotal').textContent = browseList.length;
    document.getElementById('browseTotal2').textContent = browseList.length;
    
    if (browseIndex >= browseList.length) browseIndex = 0;
    if (browseList.length > 0) {
      showBrowseQuestion();
    }
  }

  function showBrowseQuestion() {
    const q = browseList[browseIndex];
    if (!q) return;
    
    document.getElementById('browseCurrent').textContent = browseIndex + 1;
    
    const typeBadge = q.type === 'single' 
      ? '<span class="type-badge type-single">单选题</span>'
      : '<span class="type-badge type-multi">多选题</span>';
    
    document.getElementById('browseMeta').innerHTML = 
      typeBadge + '<span class="chapter-badge">' + getChapterName(q.chapter) + '</span>';
    document.getElementById('browseText').textContent = '【' + (browseIndex + 1) + '】' + q.text;
    
    const grid = document.getElementById('browseOptions');
    grid.innerHTML = '';
    const correctIndices = getCorrectOptions(q).map(a => a.charCodeAt(0) - 65);
    
    q.options.forEach((opt, idx) => {
      const div = document.createElement('div');
      div.className = 'option-item show-correct';
      if (!correctIndices.includes(idx)) {
        div.classList.remove('show-correct');
      }
      div.innerHTML = '<span class="opt-label">' + opt + '</span>';
      grid.appendChild(div);
    });
    
    const correctText = correctIndices.map(i => q.options[i]).join('、');
    document.getElementById('browseAnswer').innerHTML = 
      '<strong>✅ 正确答案：</strong>' + q.answer + '. ' + correctText;
    
    // 标记按钮状态
    const marked = getStorage(STORAGE_KEYS.MARKED_BANK).includes(q.id);
    const btn = document.getElementById('browseMarkBtn');
    if (marked) {
      btn.textContent = '⭐ 已标记';
    } else {
      btn.textContent = '⭐ 标记';
    }
  }

  function browsePrev() {
    if (browseIndex > 0) {
      browseIndex--;
      showBrowseQuestion();
    }
  }

  function browseNext() {
    if (browseIndex < browseList.length - 1) {
      browseIndex++;
      showBrowseQuestion();
    }
  }

  function browseToggleMark() {
    if (browseList.length === 0) return;
    const q = browseList[browseIndex];
    let marked = getStorage(STORAGE_KEYS.MARKED_BANK);
    const idx = marked.indexOf(q.id);
    if (idx >= 0) {
      marked.splice(idx, 1);
    } else {
      marked.push(q.id);
    }
    setStorage(STORAGE_KEYS.MARKED_BANK, marked);
    showBrowseQuestion();
  }

  function browseSpecific(qid) {
    const chId = 0;
    const type = 'all';
    document.getElementById('browseChapter').value = chId;
    document.getElementById('browseType').value = type;
    
    initBrowse();
    
    const idx = browseList.findIndex(q => q.id === qid);
    if (idx >= 0) {
      browseIndex = idx;
      showBrowseQuestion();
    }
    
    showPanel('browsePanel');
  }

  // ==================== 导出文件 ====================
  function downloadFile(content, filename) {
    const blob = new Blob(['\ufeff' + content], {type: 'text/plain;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // ==================== 初始化 ====================
  function init() {
    initChapterList();
    
    const sel = document.getElementById('browseChapter');
    CHAPTERS.forEach(ch => {
      const opt = document.createElement('option');
      opt.value = ch.id;
      opt.textContent = ch.name + ' (' + ch.count + '题)';
      sel.appendChild(opt);
    });
    
    updateHomeStats();
  }

  init();

  window.showPanel = showPanel;
  window.selectAllChapters = selectAllChapters;
  window.selectMode = selectMode;
  window.startQuiz = startQuiz;
  window.submitAnswer = submitAnswer;
  window.nextQuestion = nextQuestion;
  window.prevQuestion = prevQuestion;
  window.exitQuiz = exitQuiz;
  window.showWrongPanel = showWrongPanel;
  window.showAllReview = showAllReview;
  window.toggleMark = toggleMark;
  window.showWrongBank = showWrongBank;
  window.practiceWrong = practiceWrong;
  window.clearWrongBank = clearWrongBank;
  window.exportWrongTxt = exportWrongTxt;
  window.showMarkedBank = showMarkedBank;
  window.removeMarked = removeMarked;
  window.practiceMarked = practiceMarked;
  window.clearMarkedBank = clearMarkedBank;
  window.exportMarkedTxt = exportMarkedTxt;
  window.initBrowse = initBrowse;
  window.browsePrev = browsePrev;
  window.browseNext = browseNext;
  window.browseToggleMark = browseToggleMark;
  window.updateHomeStats = updateHomeStats;
})();
</script>
</body>
</html>
